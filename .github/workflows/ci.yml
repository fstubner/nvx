name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: [ '1.23' ]


    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go }}

    - name: Verify dependencies
      run: go mod verify

    - name: Build nvx
      run: go build -v ./...

    - name: Run unit tests
      run: go test -v -race ./...

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: false

    - name: Run govulncheck
      uses: golang/govulncheck-action@v1

    - name: Run gosec
      uses: securego/gosec@master
      with:
        args: -exclude=G204,G304,G301,G306 ./...

